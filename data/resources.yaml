apps_items:
  - name: "Count the Kicks"
    tone: "sage"
    body: "Track how long it takes your baby to get to 10 movements and notice changes over time. Available in 20+ languages."
    url: "https://countthekicks.org/"
  - name: "Contraction Timer App"
    tone: "teal"
    body: "Simple start/stop timer that calculates how far apart contractions are and how long they last."
    url: "https://contraction.app/"
  - name: "Full Term"
    tone: "lavender"
    body: "A basic iOS contraction timer with a bright, easy-to-use interface and contraction history."
    url: "https://www.fulltermapp.com/"
  - name: "Sprout Pregnancy"
    tone: "stone"
    body: "A pregnancy app with a kick counter and contraction timer built in."
    url: "https://sprout-apps.com/"

support_links:
  - label: "Give In Kind"
    url: "https://www.giveinkind.com"
    body: "Coordinate practical support after birth, including meals, errands, childcare, and other ways friends and family can help."
  - label: "Take Them A Meal"
    url: "https://www.takethemameal.com"
    body: "Create a simple meal train so people can sign up for specific days and bring food without extra back-and-forth."

