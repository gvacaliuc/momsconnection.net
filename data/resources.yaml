apps_items:
  - name: "Count the Kicks"
    tone: "sage"
    body: "Track how long it takes your baby to get to 10 movements and notice changes over time. Available in 20+ languages."
  - name: "Contraction Timer App"
    tone: "teal"
    body: "Simple start/stop timer that calculates how far apart contractions are and how long they last."
  - name: "Full Term"
    tone: "lavender"
    body: "A basic iOS contraction timer with a bright, easy-to-use interface and contraction history."
  - name: "Sprout Pregnancy"
    tone: "stone"
    body: "A pregnancy app with a kick counter and contraction timer built in."

